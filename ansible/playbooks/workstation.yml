---
- name: Configurar system-space
  hosts: localhost
  connection: local

  become: true

  vars:
    workstation_repo: "/home/{{ ansible_user }}/workspace/workstation-config"

  roles:
    - role: system_common
    - role: system_wsl
    - role: system_docker
    - role: system_powershell

- name: Configurar user-space
  hosts: localhost
  connection: local

  vars:
    workstation_repo: "/home/{{ ansible_user }}/workspace/workstation-config"

  roles:
    - role: user_dotfiles
    - role: user_tooling
