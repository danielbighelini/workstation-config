---
- name: Criar diretório keyrings
  become: true

  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Baixar chave GPG Docker
  become: true

  get_url:
    url: "{{ docker_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Adicionar chave GPG Docker
  become: true

  command:
    cmd: >
      gpg --dearmor
      -o /etc/apt/keyrings/docker.gpg
      /etc/apt/keyrings/docker.asc

  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Adicionar repositório Docker
  become: true

  apt_repository:
    repo: "{{ docker_repo }}"
    state: present
    filename: docker

- name: Instalar Docker Engine
  become: true

  apt:
    name: "{{ docker_packages }}"
    state: present

- name: Garantir Docker iniciado
  become: true

  service:
    name: docker
    state: started
    enabled: true

- name: Adicionar usuário ao grupo docker
  become: true

  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

  register: docker_group_result

- name: Avisar necessidade de reiniciar sessão
  debug:
    msg: >
      Reinicie a sessão do terminal/WSL para aplicar o grupo docker.

  when: docker_group_result.changed

- name: Validar Docker instalado
  command: docker --version

  register: docker_version
  changed_when: false

- name: Mostrar versão Docker
  debug:
    var: docker_version.stdout