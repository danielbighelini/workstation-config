---
- name: Instalar dependencias Docker repository

  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg

    state: present
    update_cache: true

- name: Criar diretório keyrings

  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Baixar chave GPG Docker

  ansible.builtin.get_url:
    url: "{{ system_docker_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Adicionar chave GPG Docker

  ansible.builtin.command:
    cmd: >
      gpg --dearmor
      -o /etc/apt/keyrings/docker.gpg
      /etc/apt/keyrings/docker.asc

  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Adicionar repositório Docker

  ansible.builtin.deb822_repository:
    name: docker
    uris: "{{ system_docker_repo_uri }}"
    suites: "{{ system_docker_repo_suite }}"
    components: "{{ system_docker_repo_components }}"
    architectures: "{{ system_docker_repo_architectures }}"
    signed_by: "{{ system_docker_repo_signed_by }}"
    install_python_debian: true
    state: present

- name: Instalar Docker Engine

  ansible.builtin.apt:
    name: "{{ system_docker_packages }}"
    state: present
    update_cache: true

- name: Garantir Docker iniciado

  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Adicionar usuário ao grupo docker

  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

  register: system_docker_group_result
  notify: Avisar necessidade de reiniciar sessão

- name: Validar Docker instalado
  ansible.builtin.command:
    cmd: docker --version

  register: system_docker_version
  changed_when: false

- name: Mostrar versão Docker
  ansible.builtin.debug:
    var: system_docker_version.stdout
