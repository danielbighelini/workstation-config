---
- name: Criar diretório keyrings
  become: true

  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Baixar chave GPG Docker
  become: true

  ansible.builtin.get_url:
    url: "{{ system_docker_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Adicionar chave GPG Docker
  become: true

  ansible.builtin.command:
    cmd: >
      gpg --dearmor
      -o /etc/apt/keyrings/docker.gpg
      /etc/apt/keyrings/docker.asc

  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Adicionar repositório Docker
  become: true

  ansible.builtin.apt_repository:
    repo: "{{ system_docker_repo }}"
    state: present
    filename: docker

- name: Instalar Docker Engine
  become: true

  ansible.builtin.apt:
    name: "{{ system_docker_packages }}"
    state: present

- name: Garantir Docker iniciado
  become: true

  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Adicionar usuário ao grupo docker
  become: true

  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

  register: system_docker_group_result
  notify: Avisar necessidade de reiniciar sessão

- name: Validar Docker instalado
  ansible.builtin.command: docker --version

  register: system_docker_version
  changed_when: false

- name: Mostrar versão Docker
  ansible.builtin.debug:
    var: system_docker_version.stdout
