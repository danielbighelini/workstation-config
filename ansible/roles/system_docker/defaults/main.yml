---
# defaults file for system_docker role
system_docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

system_docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg
system_docker_repo: >-
  deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
  https://download.docker.com/linux/ubuntu
  {{ ansible_facts.distribution_release }} stable
