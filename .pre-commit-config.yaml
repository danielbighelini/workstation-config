---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0

    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: local

    hooks:
      - id: ansible-lint
        name: ansible-lint
        entry: bash -c 'cd ansible && ansible-lint'
        language: system
        pass_filenames: false
        files: ^ansible/

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1

    hooks:
      - id: yamllint
